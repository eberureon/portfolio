<style>
  html {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }

  body {
    font-family: 'Trebuchet MS', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
    height: auto;
    min-height: 100%;
    margin: 0 0.875rem;
  }

  p {
    margin: 0;
  }

  header {
    position: fixed;
    top: 0;
    margin-block: 0.5rem;
    width: 100%;
  }

  header div {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-inline: 0.5rem;
  }

  header>div>img {
    width: 32px;
    border-radius: 50%;
  }

  .wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 36px);
  }

  main h1 {
    font-size: clamp(3rem, calc(1rem + 5vw), 4rem);
    text-align: center;
    margin-block: 0.25em;
  }

  main h3 {
    font-size: clamp(1rem, calc(0.5rem + 1vw), 1.25rem);
    font-style: italic;
    font-weight: 400;
    text-align: center;
  }

  main img {
    display: flex;
    margin: 0 auto;
  }

  main strong {
    display: block;
    font-size: 0.875rem;
    text-align: center;
  }

  footer {
    background-color: #f2f2f2;
    bottom: 0;
    box-shadow: inset 0 1px 0 0 #4f4a4a, inset 0 2px 4px 0 #191919;
    font-size: 0.75rem;
    position: fixed;
    width: 100%;
    text-align: center;
    padding: 0.625rem 0;
  }

  footer > p {
    display: inline-block;
    width: 33%;
    margin-block: 0.25em;
  }

  @media (max-width: 575px) {
    main img {
      width: 75vw;
    }

  }
</style>

<script>
  const currentYear = new Date().getFullYear();
  document.getElementById('currentYear').innerText = currentYear;
</script>
