services:
  app:
    container_name: portfolio-app-test
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80" # Map to port locally with fallback to 8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    healthcheck:
      test: wget -q -t 1 --spider http://localhost || exit 1
      interval: 30m
      timeout: 3s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
