worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/opentype
        application/x-font-ttf
        application/x-font-woff
        application/x-font-woff2;

    server {
        listen 80;
        listen [::]:80;
        
        root /usr/share/nginx/html;
        index index.html;

        # Redirect naked domain to www (if needed)
        if ($host = "ebelleon.de") {
            return 301 https://www.$host$request_uri;
        }

        # Static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|webp|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        # Robots.txt
        location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
        }

        # Security - deny access to sensitive paths
        location ~ /(config|libs|assets/sensitive) {
            deny all;
            return 404;
        }

        # Main location - handle SPA routing
        location / {
            try_files $uri $uri/ /index.html;
            
            # Basic security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # Custom error pages (if you have them)
        error_page 404 /404.html;
        error_page 500 502 503 504 /500.html;
    }
}
