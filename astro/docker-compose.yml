services:
  app:
    container_name: portfolio-app
    build: .
    restart: always
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    healthcheck:
      test: wget -q -t 1 --spider http://localhost || exit 1
      interval: 30m
      timeout: 3s
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    networks:
      - default
      - nginx-proxy_default

networks:
  nginx-proxy_default:
    external: true
